name: Build and Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore DataManager.Host.WA/DataManager.Host.WA.csproj

      - name: Build Blazor WebAssembly
        run: dotnet build DataManager.Host.WA/DataManager.Host.WA.csproj -c Release --no-restore

      - name: Publish Blazor WebAssembly
        run: dotnet publish DataManager.Host.WA/DataManager.Host.WA.csproj -c Release -o ./publish/wwwroot --no-build

      - name: Update API Base URL in appsettings.json
        if: ${{ vars.API_BASE_URL != '' }}
        run: |
          APPSETTINGS_PATH="./publish/wwwroot/wwwroot/appsettings.json"
          if [ ! -f "$APPSETTINGS_PATH" ]; then
            echo "Error: appsettings.json not found at $APPSETTINGS_PATH"
            exit 1
          fi
          TEMP_FILE=$(mktemp)
          if ! jq --arg url "${{ vars.API_BASE_URL }}" '.ApiBaseUrl = $url' "$APPSETTINGS_PATH" > "$TEMP_FILE"; then
            echo "Error: Failed to update appsettings.json"
            rm -f "$TEMP_FILE"
            exit 1
          fi
          mv "$TEMP_FILE" "$APPSETTINGS_PATH"
          echo "Updated ApiBaseUrl to: ${{ vars.API_BASE_URL }}"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: './publish/wwwroot/wwwroot'
          skip_app_build: true
          skip_api_build: true

  close-pull-request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
