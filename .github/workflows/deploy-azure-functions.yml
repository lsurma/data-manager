name: Build and Deploy to Azure Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  AZURE_FUNCTIONAPP_NAME: 'your-function-app-name'  # Set this to your Azure Function App name
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './publish'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore InstanceManager.sln

      - name: Build Blazor WebAssembly UI
        run: dotnet publish InstanceManager.Host.WA/InstanceManager.Host.WA.csproj -c Release -o ./wa-publish

      - name: Build Azure Functions API
        run: dotnet publish InstanceManager.Host.AzFuncAPI/InstanceManager.Host.AzFuncAPI.csproj -c Release -o ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

      - name: Copy Blazor WebAssembly output to Azure Functions wwwroot
        run: |
          mkdir -p ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/wwwroot
          cp -r ./wa-publish/wwwroot/* ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/wwwroot/

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
